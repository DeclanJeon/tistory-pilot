<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Replay와 Idempotency">
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#93c5fd"/></marker><style>text{font-family:Inter,Arial,'Noto Sans KR',sans-serif}.title{fill:#f8fafc;font-size:44px;font-weight:800}.sub{fill:#bfdbfe;font-size:22px}.bt{fill:white;font-size:21px;font-weight:800}.bn{fill:#dbeafe;font-size:15px}.num{fill:#e0f2fe;font-size:22px;font-weight:800}.arrow{stroke:#93c5fd;stroke-width:4;marker-end:url(#arrow)}.cap{fill:#cbd5e1;font-size:18px}</style></defs>
<rect width="1280" height="720" fill="url(#bg)"/><text x="70" y="78" class="title">Replay와 Idempotency</text><text x="70" y="118" class="sub">놓친 이벤트와 중복 mutation을 다루는 방법</text><text x="70" y="165" class="cap">PonsLink algorithm notes</text><rect x="70" y="220" width="210" height="170" rx="22" fill="#2563eb" opacity="0.94" filter="url(#shadow)"/><text x="90" y="266" class="bt">append seq</text><text x="90" y="306" class="bn">ring/zset</text><text x="235" y="365" class="num">1</text><rect x="308" y="220" width="210" height="170" rx="22" fill="#7c3aed" opacity="0.94" filter="url(#shadow)"/><text x="328" y="266" class="bt">replay afterSeq</text><text x="328" y="306" class="bn">bounded read</text><text x="473" y="365" class="num">2</text><rect x="546" y="220" width="210" height="170" rx="22" fill="#0891b2" opacity="0.94" filter="url(#shadow)"/><text x="566" y="266" class="bt">ack</text><text x="566" y="306" class="bn">max ack</text><text x="711" y="365" class="num">3</text><rect x="784" y="220" width="210" height="170" rx="22" fill="#16a34a" opacity="0.94" filter="url(#shadow)"/><text x="804" y="266" class="bt">idempotency key</text><text x="804" y="306" class="bn">body hash</text><text x="949" y="365" class="num">4</text><rect x="1022" y="220" width="210" height="170" rx="22" fill="#ea580c" opacity="0.94" filter="url(#shadow)"/><text x="1042" y="266" class="bt">cached response</text><text x="1042" y="306" class="bn">safe replay</text><text x="1187" y="365" class="num">5</text><path d="M286 305 H300" class="arrow"/><path d="M524 305 H538" class="arrow"/><path d="M762 305 H776" class="arrow"/><path d="M1000 305 H1014" class="arrow"/><rect x="70" y="560" width="1140" height="76" rx="18" fill="#0f172a" stroke="#334155"/><text x="100" y="608" class="cap">코드에서 확인한 실제 자료구조와 분기 순서를 기준으로 재구성한 그림입니다.</text></svg>