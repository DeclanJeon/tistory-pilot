<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="PonsLink technology stack map">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.25"/></filter>
    <style>
      text{font-family:Inter,Arial,'Noto Sans KR',sans-serif;fill:#e5e7eb} .title{font-size:42px;font-weight:800}.sub{font-size:20px;fill:#bfdbfe}.box{fill:#111827;stroke:#60a5fa;stroke-width:2;rx:22;filter:url(#shadow)}.h{font-size:24px;font-weight:800;fill:#93c5fd}.b{font-size:18px;fill:#e5e7eb}.tag{fill:#1d4ed8;rx:14}.tagt{font-size:15px;font-weight:700}.arrow{stroke:#93c5fd;stroke-width:4;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/></marker>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <text x="60" y="70" class="title">PonsLink 기술 스택 지도</text>
  <text x="60" y="105" class="sub">방, 요청, 결제, 미디어가 한 흐름으로 이어지는 실시간 제품 구조</text>
  <rect x="60" y="150" width="300" height="170" class="box"/>
  <text x="90" y="195" class="h">Frontend</text><text x="90" y="235" class="b">React · TypeScript · Vite</text><text x="90" y="265" class="b">Zustand · React Query</text><text x="90" y="295" class="b">Konva · Radix UI · Tailwind</text>
  <rect x="450" y="150" width="300" height="170" class="box"/>
  <text x="480" y="195" class="h">Realtime</text><text x="480" y="235" class="b">WebRTC Mesh</text><text x="480" y="265" class="b">Socket.IO Signaling</text><text x="480" y="295" class="b">DataChannel Policy Router</text>
  <rect x="840" y="150" width="300" height="170" class="box"/>
  <text x="870" y="195" class="h">Backend</text><text x="870" y="235" class="b">Node.js · Express</text><text x="870" y="265" class="b">PostgreSQL · Redis</text><text x="870" y="295" class="b">S3 · Nodemailer</text>
  <rect x="250" y="410" width="300" height="150" class="box"/>
  <text x="280" y="455" class="h">Product Flow</text><text x="280" y="495" class="b">Public Desk Request</text><text x="280" y="525" class="b">Reservation · Join Window</text>
  <rect x="650" y="410" width="300" height="150" class="box"/>
  <text x="680" y="455" class="h">Commerce</text><text x="680" y="495" class="b">Polar 우선</text><text x="680" y="525" class="b">LemonSqueezy fallback</text>
  <path d="M360 235 H450" class="arrow"/><path d="M750 235 H840" class="arrow"/><path d="M600 320 V390" class="arrow"/><path d="M550 485 H650" class="arrow"/>
  <rect x="60" y="600" width="154" height="36" class="tag"/><text x="80" y="623" class="tagt">state-first</text><rect x="230" y="600" width="160" height="36" class="tag"/><text x="250" y="623" class="tagt">request-first</text><rect x="408" y="600" width="160" height="36" class="tag"/><text x="428" y="623" class="tagt">latest-wins</text><rect x="586" y="600" width="150" height="36" class="tag"/><text x="606" y="623" class="tagt">idempotent</text><rect x="754" y="600" width="150" height="36" class="tag"/><text x="774" y="623" class="tagt">replayable</text>
</svg>
