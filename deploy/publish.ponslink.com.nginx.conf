server {
    listen 80;
    listen [::]:80;
    server_name publish.ponslink.com;
    return 301 https://publish.ponslink.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name publish.ponslink.com;

    ssl_certificate /etc/ssl/ponslink/ponslink.crt;
    ssl_certificate_key /etc/ssl/ponslink/ponslink.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:4310;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    access_log /var/log/nginx/publish.ponslink.com.access.log;
    error_log /var/log/nginx/publish.ponslink.com.error.log;
}
